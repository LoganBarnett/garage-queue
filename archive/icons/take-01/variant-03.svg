<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Variant 03: Bold, chunky, flat design with thick strokes and vivid saturated colors -->
  <defs>
    <style>
      .wire { stroke: #2d2d2d; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .wire-bg { stroke: #fff; stroke-width: 10; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Input line with arrow-dot terminus -->
  <line x1="8" y1="128" x2="74" y2="128" class="wire-bg"/>
  <line x1="8" y1="128" x2="74" y2="128" class="wire"/>
  <circle cx="14" cy="128" r="6" fill="#2d2d2d" stroke="#fff" stroke-width="3"/>

  <!-- Garage: blocky, strong silhouette -->
  <path d="M74,154 L74,104 L104,80 L134,104 L134,154 Z" stroke="#fff" stroke-width="10" fill="none" stroke-linejoin="round"/>
  <path d="M74,154 L74,104 L104,80 L134,104 L134,154 Z" fill="#2d2d2d" stroke="#2d2d2d" stroke-width="5" stroke-linejoin="round"/>
  <!-- Wide garage door -->
  <rect x="88" y="120" width="32" height="34" rx="3" fill="#555" stroke="#fff" stroke-width="4"/>
  <rect x="88" y="120" width="32" height="34" rx="3" fill="#555" stroke="#2d2d2d" stroke-width="2"/>

  <!-- Straight angular fork lines -->
  <line x1="134" y1="114" x2="172" y2="62" class="wire-bg"/>
  <line x1="134" y1="114" x2="172" y2="62" class="wire"/>

  <line x1="134" y1="128" x2="178" y2="128" class="wire-bg"/>
  <line x1="134" y1="128" x2="178" y2="128" class="wire"/>

  <line x1="134" y1="142" x2="172" y2="194" class="wire-bg"/>
  <line x1="134" y1="142" x2="172" y2="194" class="wire"/>

  <!-- Triangle: hot red-orange -->
  <polygon points="198,28 228,74 168,74" stroke="#fff" stroke-width="8" fill="none" stroke-linejoin="round"/>
  <polygon points="198,28 228,74 168,74" fill="#ef4444" stroke="#2d2d2d" stroke-width="4" stroke-linejoin="round"/>

  <!-- Circle: electric blue -->
  <circle cx="206" cy="128" r="28" stroke="#fff" stroke-width="8" fill="none"/>
  <circle cx="206" cy="128" r="28" fill="#3b82f6" stroke="#2d2d2d" stroke-width="4"/>

  <!-- Square: vivid yellow -->
  <rect x="170" y="170" width="56" height="56" rx="4" stroke="#fff" stroke-width="8" fill="none"/>
  <rect x="170" y="170" width="56" height="56" rx="4" fill="#eab308" stroke="#2d2d2d" stroke-width="4"/>
</svg>
