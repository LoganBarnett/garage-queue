<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Take 02, Variant 06: Chunky bold style, thick strokes, large teal door, vivid primary-adjacent shapes -->

  <!-- Input line -->
  <line x1="8" y1="128" x2="70" y2="128" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <line x1="8" y1="128" x2="70" y2="128" stroke="#444" stroke-width="5" stroke-linecap="round"/>

  <!-- Garage body -->
  <rect x="70" y="90" width="60" height="76" rx="4" stroke="#fff" stroke-width="10" fill="none" stroke-linejoin="round"/>
  <rect x="70" y="90" width="60" height="76" rx="4" fill="#7c3aed" stroke="#5b21b6" stroke-width="4"/>

  <!-- Big teal door -->
  <rect x="82" y="108" width="36" height="58" rx="3" fill="#2dd4bf" stroke="#0d9488" stroke-width="3"/>
  <line x1="82" y1="124" x2="118" y2="124" stroke="#0d9488" stroke-width="2"/>
  <line x1="82" y1="140" x2="118" y2="140" stroke="#0d9488" stroke-width="2"/>
  <line x1="82" y1="152" x2="118" y2="152" stroke="#0d9488" stroke-width="2"/>

  <!-- Fork lines -->
  <line x1="130" y1="106" x2="166" y2="62" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <line x1="130" y1="106" x2="166" y2="62" stroke="#444" stroke-width="5" stroke-linecap="round"/>

  <line x1="130" y1="128" x2="176" y2="128" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <line x1="130" y1="128" x2="176" y2="128" stroke="#444" stroke-width="5" stroke-linecap="round"/>

  <line x1="130" y1="150" x2="166" y2="194" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <line x1="130" y1="150" x2="166" y2="194" stroke="#444" stroke-width="5" stroke-linecap="round"/>

  <!-- Triangle: hot orange -->
  <polygon points="194,30 226,80 162,80" stroke="#fff" stroke-width="10" fill="none" stroke-linejoin="round"/>
  <polygon points="194,30 226,80 162,80" fill="#f97316" stroke="#c2410c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Circle: electric cyan -->
  <circle cx="206" cy="128" r="28" stroke="#fff" stroke-width="10" fill="none"/>
  <circle cx="206" cy="128" r="28" fill="#06b6d4" stroke="#0e7490" stroke-width="4"/>

  <!-- Square: vivid violet -->
  <rect x="164" y="168" width="56" height="56" rx="5" stroke="#fff" stroke-width="10" fill="none"/>
  <rect x="164" y="168" width="56" height="56" rx="5" fill="#a78bfa" stroke="#7c3aed" stroke-width="4"/>
</svg>
