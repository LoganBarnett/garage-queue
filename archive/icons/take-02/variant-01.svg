<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Take 02, Variant 01: Purple boxy garage, teal door, straight forks, 01-palette shapes -->

  <!-- Input line -->
  <line x1="12" y1="128" x2="72" y2="128" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <line x1="12" y1="128" x2="72" y2="128" stroke="#444" stroke-width="3" stroke-linecap="round"/>

  <!-- Garage body -->
  <rect x="72" y="94" width="56" height="68" rx="3" stroke="#fff" stroke-width="7" fill="none" stroke-linejoin="round"/>
  <rect x="72" y="94" width="56" height="68" rx="3" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>

  <!-- Garage door: tall teal rectangle, clearly visible -->
  <rect x="86" y="112" width="28" height="50" rx="2" stroke="#7c3aed" stroke-width="2" fill="none"/>
  <rect x="86" y="112" width="28" height="50" rx="2" fill="#14b8a6" stroke="#0d9488" stroke-width="2"/>
  <!-- Door handle -->
  <circle cx="108" cy="138" r="2.5" fill="#0d9488" stroke="#0f766e" stroke-width="1"/>

  <!-- Fork lines -->
  <line x1="128" y1="110" x2="168" y2="62" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <line x1="128" y1="110" x2="168" y2="62" stroke="#444" stroke-width="3" stroke-linecap="round"/>

  <line x1="128" y1="128" x2="178" y2="128" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <line x1="128" y1="128" x2="178" y2="128" stroke="#444" stroke-width="3" stroke-linecap="round"/>

  <line x1="128" y1="146" x2="168" y2="194" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <line x1="128" y1="146" x2="168" y2="194" stroke="#444" stroke-width="3" stroke-linecap="round"/>

  <!-- Triangle: amber -->
  <polygon points="194,32 222,76 166,76" stroke="#fff" stroke-width="7" fill="none" stroke-linejoin="round"/>
  <polygon points="194,32 222,76 166,76" fill="#f59e0b" stroke="#d97706" stroke-width="3" stroke-linejoin="round"/>

  <!-- Circle: cyan -->
  <circle cx="206" cy="128" r="26" stroke="#fff" stroke-width="7" fill="none"/>
  <circle cx="206" cy="128" r="26" fill="#06b6d4" stroke="#0891b2" stroke-width="3"/>

  <!-- Square: violet -->
  <rect x="168" y="170" width="52" height="52" rx="4" stroke="#fff" stroke-width="7" fill="none"/>
  <rect x="168" y="170" width="52" height="52" rx="4" fill="#8b5cf6" stroke="#7c3aed" stroke-width="3"/>
</svg>
