<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Variant 06: Compact, centered composition with dashed input line and solid forks.
       Garage rendered as a simple glyph. Shapes slightly larger. -->
  <defs>
    <style>
      .obg { stroke: #fff; stroke-width: 6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .fg { stroke: #444; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Dashed input line -->
  <line x1="16" y1="128" x2="72" y2="128" class="obg"/>
  <line x1="16" y1="128" x2="72" y2="128" stroke="#444" stroke-width="2.5" stroke-dasharray="8,5" fill="none" stroke-linecap="round"/>

  <!-- Garage: flat-top modern style (rectangle + horizontal roof overhang) -->
  <rect x="72" y="98" width="52" height="54" rx="2" class="obg"/>
  <rect x="72" y="98" width="52" height="54" rx="2" fill="#3a3a3a" stroke="#444" stroke-width="2.5"/>
  <!-- Roof overhang -->
  <line x1="66" y1="98" x2="130" y2="98" class="obg"/>
  <line x1="66" y1="98" x2="130" y2="98" stroke="#444" stroke-width="3" stroke-linecap="round"/>
  <!-- Roll-up door segments -->
  <line x1="88" y1="118" x2="108" y2="118" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="126" x2="108" y2="126" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="134" x2="108" y2="134" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="88" y1="142" x2="108" y2="142" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="86" y="112" width="24" height="40" rx="1" stroke="#555" stroke-width="1.5" fill="none"/>

  <!-- Solid fork lines -->
  <path d="M124,112 L166,62" class="obg"/>
  <path d="M124,112 L166,62" class="fg"/>

  <line x1="124" y1="126" x2="176" y2="126" class="obg"/>
  <line x1="124" y1="126" x2="176" y2="126" class="fg"/>

  <path d="M124,140 L166,192" class="obg"/>
  <path d="M124,140 L166,192" class="fg"/>

  <!-- Triangle: rose/pink -->
  <polygon points="194,28 226,76 162,76" class="obg"/>
  <polygon points="194,28 226,76 162,76" fill="#f43f5e" stroke="#be123c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Circle: lime green -->
  <circle cx="206" cy="126" r="28" class="obg"/>
  <circle cx="206" cy="126" r="28" fill="#84cc16" stroke="#4d7c0f" stroke-width="2.5"/>

  <!-- Square: bright blue -->
  <rect x="164" y="168" width="56" height="56" rx="5" class="obg"/>
  <rect x="164" y="168" width="56" height="56" rx="5" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2.5"/>
</svg>
